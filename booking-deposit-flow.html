<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Booking Deposit Flow — PS VIBE Customer Bot</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
    --success: #bbf7d0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
      --success: #166534;
    }
  }
  body { margin: 0; background: var(--bg); color: var(--fg); font: 14px/1.4 ui-sans-serif, system-ui, sans-serif; }
  main { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
  svg { width: 100%; height: auto; display: block; }
  .title { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .label { font-size: 13px; font-weight: 600; fill: var(--fg); }
  .small { font-size: 11px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1.2; rx: 6; ry: 6; }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .risk { fill: var(--risk); }
  .success { fill: var(--success); }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .edge-dashed { stroke: var(--line); stroke-width: 1.5; fill: none; stroke-dasharray: 6 4; }
  .zone { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 6 5; opacity: 0.7; }
</style>
<main>
  <svg viewBox="0 0 1160 960" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
    <!-- Title -->
    <text x="580" y="30" text-anchor="middle" class="title">PS VIBE Customer Bot — Booking Deposit Flow</text>
    <text x="580" y="50" text-anchor="middle" class="small">3 Options: Wallet Deduction · KPay Link · Bank Transfer (Staff Verify)</text>

    <!-- ════════════════════════════════════════════ -->
    <!-- LEGEND -->
    <!-- ════════════════════════════════════════════ -->
    <g transform="translate(20, 900)">
      <rect x="0" y="0" width="1120" height="50" class="zone" rx="6"/>
      <text x="16" y="20" class="small" font-weight="600">Legend:</text>
      <rect x="120" y="6" width="18" height="18" class="neutral" stroke="var(--line)" stroke-width="1" rx="3"/>
      <text x="144" y="20" class="small">User Action</text>
      <rect x="260" y="6" width="18" height="18" class="process" stroke="var(--line)" stroke-width="1" rx="3"/>
      <text x="284" y="20" class="small">System Process</text>
      <rect x="410" y="6" width="18" height="18" class="external" stroke="var(--line)" stroke-width="1" rx="3"/>
      <text x="434" y="20" class="small">External Payment</text>
      <rect x="560" y="6" width="18" height="18" class="success" stroke="var(--line)" stroke-width="1" rx="3"/>
      <text x="584" y="20" class="small">Success / Confirmed</text>
      <rect x="720" y="6" width="18" height="18" class="risk" stroke="var(--line)" stroke-width="1" rx="3"/>
      <text x="744" y="20" class="small">Failure / Rejected</text>
      <line x1="880" y1="15" x2="940" y2="15" class="edge" marker-end="url(#arrow)"/>
      <text x="948" y="20" class="small">Flow</text>
      <line x1="880" y1="36" x2="940" y2="36" class="edge-dashed" marker-end="url(#arrow)"/>
      <text x="948" y="41" class="small">Webhook / Notification</text>
    </g>

    <!-- Arrow marker definitions -->
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0,0 8,3 0,6" fill="var(--line)"/>
      </marker>
      <marker id="arrow-success" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0,0 8,3 0,6" fill="#166534"/>
      </marker>
    </defs>

    <!-- ════════════════════════════════════════════ -->
    <!-- OPTION 1: Wallet Deduction (Member) -->
    <!-- ════════════════════════════════════════════ -->
    <!-- Zone -->
    <rect x="30" y="70" width="360" height="810" class="zone" rx="8"/>
    <text x="210" y="92" text-anchor="middle" class="label" fill="var(--fg)">Option 1: Wallet Deduction (Member)</text>

    <!-- Step 1: Confirm Booking -->
    <rect x="50" y="110" width="320" height="50" class="neutral node"/>
    <text x="210" y="132" text-anchor="middle" class="label">၁. Booking Confirm</text>
    <text x="210" y="148" text-anchor="middle" class="small">Customer confirms booking details</text>

    <!-- Arrow -->
    <line x1="210" y1="160" x2="210" y2="190" class="edge" marker-end="url(#arrow)"/>

    <!-- Step 2: Check Wallet -->
    <rect x="70" y="195" width="280" height="50" class="process node"/>
    <text x="210" y="217" text-anchor="middle" class="label">၂. Check Wallet Balance</text>
    <text x="210" y="233" text-anchor="middle" class="small">balance ≥ deposit amount?</text>

    <!-- Diamond: decision point -->
    <polygon points="210,265 260,305 210,345 160,305" class="neutral node" fill="var(--neutral)"/>
    <text x="210" y="302" text-anchor="middle" class="small">Sufficient</text>
    <text x="210" y="316" text-anchor="middle" class="small">Balance?</text>

    <!-- YES path (left) -->
    <line x1="210" y1="265" x2="210" y2="235" class="edge" stroke="#166534" marker-end="url(#arrow-success)"/>
    <text x="220" y="248" class="small" fill="#166534">Yes ✅</text>

    <!-- Actually let me fix the flow -- YES goes down, NO goes right -->
    <line x1="260" y1="305" x2="370" y2="305" class="edge" marker-end="url(#arrow)"/>
    <text x="300" y="297" class="small">No ❌ (Topup)</text>

    <!-- Deduct Wallet (YES) -->
    <rect x="70" y="365" width="280" height="55" class="success node"/>
    <text x="210" y="387" text-anchor="middle" class="label">၃. Deposit Deducted from Wallet</text>
    <text x="210" y="403" text-anchor="middle" class="small">wallet_balance -= deposit_amount</text>
    <text x="210" y="415" text-anchor="middle" class="small">cash_movements (deposit inject)</text>

    <line x1="210" y1="420" x2="210" y2="450" class="edge" marker-end="url(#arrow)"/>

    <!-- Booking Confirmed -->
    <rect x="90" y="455" width="240" height="50" class="success node"/>
    <text x="210" y="477" text-anchor="middle" class="label">၄. Booking Confirmed ✅</text>
    <text x="210" y="493" text-anchor="middle" class="small">status → "confirmed"</text>

    <line x1="210" y1="505" x2="210" y2="535" class="edge" marker-end="url(#arrow)"/>

    <!-- Session + Settlement -->
    <rect x="70" y="540" width="280" height="55" class="process node"/>
    <text x="210" y="558" text-anchor="middle" class="label">၅. Player Checks In</text>
    <text x="210" y="574" text-anchor="middle" class="small">Deposit  → session payment</text>
    <text x="210" y="590" text-anchor="middle" class="small">Staff completes at counter</text>

    <line x1="210" y1="595" x2="210" y2="625" class="edge" marker-end="url(#arrow)"/>

    <!-- Check-out -->
    <rect x="50" y="630" width="320" height="55" class="node neutral"/>
    <text x="210" y="650" text-anchor="middle" class="label">၆. Session Done / No-Show</text>
    <text x="210" y="666" text-anchor="middle" class="small">If played → deposit converted</text>
    <text x="210" y="682" text-anchor="middle" class="small">If no-show → deposit forfeited</text>

    <!-- No path → Topup prompt -->
    <!-- Show goes to forfeit -->
    <line x1="210" y1="685" x2="210" y2="715" class="edge" marker-end="url(#arrow)"/>

    <!-- No-show forfeit -->
    <rect x="70" y="720" width="280" height="45" class="risk node"/>
    <text x="210" y="740" text-anchor="middle" class="label">Deposit Forfeited (No-Show)</text>
    <text x="210" y="756" text-anchor="middle" class="small">→ income (booking_revenue)</text>

    <!-- NO path → Topup -->
    <rect x="420" y="275" width="280" height="55" class="external node"/>
    <text x="560" y="295" text-anchor="middle" class="label">Topup Required</text>
    <text x="560" y="311" text-anchor="middle" class="small">"Wallet balance {N} Ks — အနည်းဆုံး {M} Ks လိုပါတယ်"</text>
    <text x="560" y="327" text-anchor="middle" class="small">→ redirect to Option 2 / 3</text>

    <!-- ════════════════════════════════════════════ -->
    <!-- OPTION 2: KPay / WavePay Link -->
    <!-- ════════════════════════════════════════════ -->
    <rect x="410" y="70" width="360" height="810" class="zone" rx="8"/>
    <text x="590" y="92" text-anchor="middle" class="label">Option 2: KPay / WavePay Link</text>

    <!-- Step 1: Confirm -->
    <rect x="430" y="110" width="320" height="50" class="neutral node"/>
    <text x="590" y="132" text-anchor="middle" class="label">၁. Booking Confirm</text>
    <text x="590" y="148" text-anchor="middle" class="small">Customer confirms booking + amount</text>

    <line x1="590" y1="160" x2="590" y2="190" class="edge" marker-end="url(#arrow)"/>

    <!-- Step 2: Generate Payment Link -->
    <rect x="440" y="195" width="300" height="50" class="process node"/>
    <text x="590" y="215" text-anchor="middle" class="label">၂. Generate Payment Link</text>
    <text x="590" y="233" text-anchor="middle" class="small">KPay / WavePay API → အခပေးလင့်</text>

    <line x1="590" y1="245" x2="590" y2="275" class="edge" marker-end="url(#arrow)"/>

    <!-- Step 3: Customer Pays -->
    <rect x="440" y="280" width="300" height="50" class="external node"/>
    <text x="590" y="300" text-anchor="middle" class="label">၃. Customer Pays via Link</text>
    <text x="590" y="318" text-anchor="middle" class="small">KPay / WavePay app ဖွင့်ပြီး ပေးချေ</text>

    <line x1="590" y1="330" x2="590" y2="360" class="edge" marker-end="url(#arrow)"/>

    <!-- Step 4: Webhook Verify -->
    <rect x="440" y="365" width="300" height="50" class="process node"/>
    <text x="590" y="385" text-anchor="middle" class="label">၄. Payment Webhook Callback</text>
    <text x="590" y="403" text-anchor="middle" class="small">KPay/WavePay က အတည်ပြုချက်ပြန်</text>

    <!-- Diamond: verified? -->
    <polygon points="590,435 640,475 590,515 540,475" class="neutral node" fill="var(--neutral)"/>
    <text x="590" y="472" text-anchor="middle" class="small">Verified?</text>

    <!-- YES -->
    <line x1="590" y1="435" x2="590" y2="400" class="edge" stroke="#166534"/>
    <text x="598" y="418" class="small" fill="#166534">Yes ✅</text>
    <line x1="640" y1="475" x2="770" y2="475" class="edge" marker-end="url(#arrow)"/>
    <text x="700" y="467" class="small">No ❌</text>

    <!-- Booking Confirmed -->
    <rect x="460" y="540" width="260" height="50" class="success node"/>
    <text x="590" y="562" text-anchor="middle" class="label">၅. Booking Confirmed ✅</text>
    <text x="590" y="578" text-anchor="middle" class="small">Deposit → cash_movements (inject)</text>

    <line x1="590" y1="590" x2="590" y2="620" class="edge" marker-end="url(#arrow)"/>

    <!-- Session -->
    <rect x="440" y="625" width="300" height="50" class="neutral node"/>
    <text x="590" y="645" text-anchor="middle" class="label">၆. Player Checks In</text>
    <text x="590" y="663" text-anchor="middle" class="small">Deposit → session payment</text>

    <line x1="590" y1="675" x2="590" y2="705" class="edge" marker-end="url(#arrow)"/>

    <!-- No-show -->
    <rect x="450" y="710" width="280" height="45" class="risk node"/>
    <text x="590" y="730" text-anchor="middle" class="label">No-Show → Deposit Forfeited</text>
    <text x="590" y="746" text-anchor="middle" class="small">Keep as revenue (booking_fee)</text>

    <!-- NO path → Payment Failed -->
    <rect x="820" y="450" width="280" height="50" class="risk node"/>
    <text x="960" y="470" text-anchor="middle" class="label">Payment Failed / Expired</text>
    <text x="960" y="488" text-anchor="middle" class="small">"ငွေပေးချေမှု မအောင်မြင်ပါ။ ထပ်ကြိုးစားပါ"</text>

    <line x1="960" y1="500" x2="960" y2="600" class="edge-dashed" marker-end="url(#arrow)"/>

    <rect x="830" y="605" width="260" height="50" class="neutral node"/>
    <text x="960" y="625" text-anchor="middle" class="label">Booking Cancelled Auto</text>
    <text x="960" y="643" text-anchor="middle" class="small">status → "cancelled" (payment_timeout)</text>

    <!-- ════════════════════════════════════════════ -->
    <!-- OPTION 3: Bank Transfer (Staff Verify) -->
    <!-- ════════════════════════════════════════════ -->
    <rect x="790" y="70" width="350" height="810" class="zone" rx="8"/>
    <text x="965" y="92" text-anchor="middle" class="label">Option 3: Bank Transfer + Staff Verify</text>

    <rect x="810" y="110" width="310" height="50" class="neutral node"/>
    <text x="965" y="132" text-anchor="middle" class="label">၁. Booking Confirm</text>
    <text x="965" y="148" text-anchor="middle" class="small">Customer sees bank details</text>

    <line x1="965" y1="160" x2="965" y2="190" class="edge" marker-end="url(#arrow)"/>

    <rect x="820" y="195" width="290" height="50" class="external node"/>
    <text x="965" y="215" text-anchor="middle" class="label">၂. Customer Transfers</text>
    <text x="965" y="233" text-anchor="middle" class="small">KBZ / AYA / WavePay → shop account</text>

    <line x1="965" y1="245" x2="965" y2="275" class="edge" marker-end="url(#arrow)"/>

    <rect x="820" y="280" width="290" height="50" class="neutral node"/>
    <text x="965" y="300" text-anchor="middle" class="label">၃. Customer Sends Slip</text>
    <text x="965" y="318" text-anchor="middle" class="small">Screenshot / Ref No. → bot သို့</text>

    <line x1="965" y1="330" x2="965" y2="360" class="edge" marker-end="url(#arrow)"/>

    <rect x="820" y="365" width="290" height="50" class="process node"/>
    <text x="965" y="385" text-anchor="middle" class="label">၄. Staff Verifies</text>
    <text x="965" y="403" text-anchor="middle" class="small">Admin dashboard / manual check</text>

    <line x1="965" y1="415" x2="965" y2="445" class="edge" marker-end="url(#arrow)"/>

    <!-- Diamond -->
    <polygon points="965,475 1020,515 965,555 910,515" class="neutral node" fill="var(--neutral)"/>
    <text x="965" y="512" text-anchor="middle" class="small">Verified?</text>

    <line x1="965" y1="475" x2="965" y2="440" class="edge" stroke="#166534"/>
    <text x="975" y="455" class="small" fill="#166534">Yes ✅</text>

    <rect x="860" y="580" width="210" height="50" class="success node"/>
    <text x="965" y="602" text-anchor="middle" class="label">၅. Booking Confirmed ✅</text>
    <text x="965" y="618" text-anchor="middle" class="small">Staff confirms → deposit record</text>

    <line x1="965" y1="630" x2="965" y2="660" class="edge" marker-end="url(#arrow)"/>

    <rect x="830" y="665" width="270" height="50" class="neutral node"/>
    <text x="965" y="685" text-anchor="middle" class="label">၆. Player Checks In</text>
    <text x="965" y="703" text-anchor="middle" class="small">Deposit → session payment</text>

    <line x1="965" y1="715" x2="965" y2="745" class="edge" marker-end="url(#arrow)"/>

    <rect x="840" y="750" width="250" height="45" class="risk node"/>
    <text x="965" y="770" text-anchor="middle" class="label">No-Show → Deposit Forfeited</text>
    <text x="965" y="786" text-anchor="middle" class="small">Staff adjust → booking_revenue</text>

    <!-- ════════════════════════════════════════════ -->
    <!-- Pricing & Rules Box -->
    <!-- ════════════════════════════════════════════ -->
    <rect x="30" y="70" width="360" height="810" class="zone" rx="8" fill="none"/>

    <!-- Key Decision Rules Box -->
    <rect x="30" y="860" width="1110" height="36" class="zone" rx="6" fill="none"/>
    <text x="40" y="884" class="label">
      <tspan>Deposit Amount:</tspan>
      <tspan fill="var(--muted)"> 1hr = 5000 Ks · 2hr = 8000 Ks · PS5 Pro = +2000 Ks · Peak (Fri-Sun 18:00-21:00) = +50%</tspan>
    </text>
  </svg>
</main>
</html>
